name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:


  build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }} .

      - name: Push Docker image with version tag
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }}
        
      - name: Print pushed image version
        run: |
          echo "==========================================="
          echo "Docker image successfully pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }}"
          echo "==========================================="
