name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:


  build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }} .

      - name: Push Docker image with version tag
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }}
        
      - name: Print pushed image version
        run: |
          echo "==========================================="
          echo "Docker image successfully pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }}"
          echo "==========================================="
      
      - name: Checkout deploy repository
        uses: actions/checkout@v6.0.2
        with:
          repository: VMuthulakshmi/fast_api_deploy
          token: ${{ secrets.GH_PAT }}
          path: fast_api_deploy

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|\(image: .*/fast_api:\).*|\1${{ github.sha }}|" fast_api_deploy/fast_api_deployment.yaml

      - name: Raise PR to deploy repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd fast_api_deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="update-image-${{ github.sha }}"
          git checkout -b $BRANCH
          git add fast_api_deployment.yaml
          git commit -m "chore: update Fast API service image to ${{ github.sha }}"
          git push origin $BRANCH
          gh pr create \
            --repo VMuthulakshmi/fast_api_deploy \
            --base main \
            --head $BRANCH \
            --title "chore: update Fast API service image to ${{ github.sha }}" \
            --body "Automated PR: update Fast API container image to \`${{ secrets.DOCKER_USERNAME }}/fast_api:${{ github.sha }}\`"